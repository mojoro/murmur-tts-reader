# Dev overrides — mounts source code so changes apply without --build.
# The app service runs `npm run dev` instead of the production build.
# The orchestrator mounts source and uses uvicorn --reload for auto-restart.
services:
  app:
    build:
      context: .
      target: build
    command: npx nuxi dev --host 0.0.0.0 --port 3000
    volumes:
      - .:/app
      - /app/node_modules

  orchestrator:
    volumes:
      - murmur-data:/app/data
      - ./orchestrator:/app/orchestrator
    command: >
      orchestrator/.venv/bin/uvicorn orchestrator.main:app
      --host 0.0.0.0 --port 8000 --reload
      --reload-dir orchestrator
