# docker-compose.yml
services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${MURMUR_HTTP_PORT:-80}:80"
      - "${MURMUR_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/setup.html:/srv/setup.html:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - MURMUR_HOST=${MURMUR_HOST}
    depends_on:
      - app

  app:
    build: ./frontend
    ports:
      - "4000:3000"
    environment:
      - NUXT_ORCHESTRATOR_URL=http://orchestrator:8000
      - NUXT_JWT_SECRET=${MURMUR_JWT_SECRET:?MURMUR_JWT_SECRET must be set in .env}
    depends_on:
      orchestrator:
        condition: service_started

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    volumes:
      - ./data:/app/data
    environment:
      - MURMUR_JWT_SECRET=${MURMUR_JWT_SECRET:?MURMUR_JWT_SECRET must be set in .env}
      - MURMUR_ALIGN_URL=http://align:8001
      - MURMUR_DATA_DIR=/app/data
      - HF_TOKEN=${HF_TOKEN:-}
    depends_on:
      align:
        condition: service_started
        required: false

  align:
    build:
      context: .
      dockerfile: alignment-server/Dockerfile
    profiles:
      - full
    volumes:
      - murmur-align-cache:/app/cache

volumes:
  caddy_data:
  caddy_config:
  murmur-align-cache:
