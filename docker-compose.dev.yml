# Dev overrides — the app service runs nuxi dev with source mounted
# for hot reload without rebuilding. Orchestrator still uses the built
# image; rebuild with: docker compose up --build orchestrator
services:
  app:
    build:
      context: .
      target: build
    command: npx nuxi dev --host 0.0.0.0 --port 3000
    volumes:
      - .:/app
      - /app/node_modules
