openapi: 3.1.0
info:
  title: Murmur Orchestrator API
  version: 1.0.0
  description: |
    Internal FastAPI service that owns the SQLite database, audio files, TTS engine
    lifecycle, and the job queue. Not exposed to browsers directly — the Nuxt/Nitro
    BFF validates the JWT cookie, injects `X-User-Id`, and proxies requests here.

    **Audience:** BFF developers, operators, and anyone wiring a non-Nuxt client
    (e.g. a mobile app) to the orchestrator.

    ## Authentication

    The orchestrator does not validate JWTs. It trusts an `X-User-Id: <int>` HTTP
    header that is injected by a trusted upstream (the Nitro BFF after it validates
    the `murmur_token` cookie, or any similarly-trusted gateway). The header is
    parsed by `orchestrator/auth.py::get_current_user_id`; a missing or
    non-integer value produces `401 Invalid user ID`.

    Because the orchestrator accepts this header unauthenticated, it MUST NOT be
    exposed directly to untrusted clients. Always front it with the BFF or an
    equivalent.

    Public routes (no `X-User-Id` needed):
    - `GET /health`
    - `POST /auth/register`, `POST /auth/login`
    - `GET /backends` (the list), `GET /backends/events` (SSE)

    All audio/thumbnail/image endpoints (including `GET /audio/{read_id}/bundle`,
    `GET /audio/{read_id}/{segment_index}`, `GET /thumbnails/{read_id}`, and
    `GET /images/{read_id}/{index}`) now require `X-User-Id` and enforce
    per-user ownership — cross-tenant access yields `404 Not found`.

    ## Per-user isolation

    When present, `X-User-Id` scopes all DB queries. A caller that passes a different
    integer will see a different user's data — the orchestrator trusts the header
    completely.

    ## Server-Sent Events

    `/queue/events` and `/backends/events` return `text/event-stream`. Each event
    has a named type (`event:` field) and a JSON-encoded string in the `data:`
    field — clients must `JSON.parse` the `data:` value to obtain the event
    object. See the `JobEvent` and `BackendStatusEvent` schemas.

servers:
  - url: http://localhost:8000
    description: Dev (orchestrator run directly via uv)
  - url: http://orchestrator:8000
    description: Inside the Docker Compose network (service name `orchestrator`)

tags:
  - name: Auth
    description: Registration and login (issues JWTs the BFF stores in a cookie)
  - name: Health
    description: Liveness/readiness probe
  - name: Reads
    description: Library of user-created reads (text, URL, file imports)
  - name: Segments/Audio
    description: Audio segment streaming and bundle download
  - name: Thumbnails
    description: Library card thumbnails
  - name: Images
    description: Inline images extracted from imported documents
  - name: Voices
    description: Built-in and user-cloned voices
  - name: Bookmarks
    description: Per-read bookmarks
  - name: Jobs
    description: TTS generation job queue
  - name: Backends
    description: |
      TTS engine lifecycle (install, select, uninstall, events).

      Mutating routes (`POST /backends/select`, `POST /backends/install`,
      `DELETE /backends/{name}`) require `X-User-Id` and return `401` when it
      is missing. The read-only `GET /backends` and the `GET /backends/events`
      SSE stream remain public — they do not call `get_current_user_id`.
  - name: Settings
    description: Per-user key/value settings

security:
  - userIdHeader: []

paths:
  # ───────────────────────── Auth ─────────────────────────
  /auth/register:
    post:
      operationId: register
      summary: Register a new user
      description: |
        Creates a user row and returns a JWT the BFF can set as an httpOnly cookie.
        The orchestrator does not set any cookies itself — it simply returns the
        token in the JSON body.

        Rate-limited to **3 requests per minute per client IP** (sliding window,
        in-memory) via `orchestrator/rate_limit.py`; excess requests return `429`.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |
            Request body failed validation (invalid email, password shorter than
            8 or longer than 128 characters, `display_name` longer than 100
            characters).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/login:
    post:
      operationId: login
      summary: Log in with email + password
      description: |
        Verifies the password against the bcrypt hash in the DB and returns a JWT
        plus the user profile. The BFF stores the token as an httpOnly cookie.

        Rate-limited to **5 requests per minute per client IP** (sliding window,
        in-memory) via `orchestrator/rate_limit.py`; excess requests return `429`.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/RateLimited"

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Return the caller's user profile
      description: |
        Returns the user identified by the `X-User-Id` header. The BFF calls
        this on cookie validation to render the logged-in user. Source:
        `orchestrator/routers/auth_router.py:60`.
      tags: [Auth]
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          description: Missing or invalid `X-User-Id` header
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User referenced by the header no longer exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Health ─────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Service health probe
      description: |
        Returns database status and the name of the currently running TTS engine.
        The `alignment` field is reserved and is always `null` in the current
        implementation (`orchestrator/routers/health.py`).
      tags: [Health]
      security: []
      responses:
        "200":
          description: Health payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ───────────────────────── Reads ─────────────────────────
  /reads:
    get:
      operationId: listReads
      summary: List the current user's reads (newest first)
      tags: [Reads]
      responses:
        "200":
          description: Array of read summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRead
      summary: Create a new read
      description: |
        The orchestrator splits `content` into sentence-sized segments via
        `orchestrator/sentence_splitter.py` and inserts one `audio_segments` row
        per segment. Audio generation is a separate step (`POST
        /reads/{read_id}/generate`).
      tags: [Reads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReadRequest"
      responses:
        "201":
          description: Created read detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /reads/{read_id}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    get:
      operationId: getRead
      summary: Get a read with all its segments
      tags: [Reads]
      responses:
        "200":
          description: Read detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRead
      summary: Update a read's title or playback progress
      description: |
        At least one field must be provided (empty body returns 400).
      tags: [Reads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReadRequest"
      responses:
        "200":
          description: Updated read detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadDetail"
        "400":
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteRead
      summary: Delete a read and its audio, thumbnails, and images
      tags: [Reads]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /reads/{read_id}/generate:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    post:
      operationId: generateAudio
      summary: Queue a TTS generation job for the read
      description: |
        Creates a job for the active TTS engine. Fails with 409 if another job
        is already `pending`, `running`, or `waiting_for_backend` for this read.
        If `regenerate` is true, all existing segments for the read are reset
        and the on-disk audio directory is wiped first.
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "201":
          description: Job created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          description: All segments already generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Active job already exists for this read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          description: No TTS engine running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Segments / Audio ─────────────────────────
  /audio/{read_id}/bundle:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
      - name: segments
        in: query
        required: false
        description: |
          Comma-separated list of segment indices to include (e.g. `0,1,2,3`).
          Non-numeric tokens are silently dropped. If omitted, all generated
          segments for the read are bundled.
        schema:
          type: string
          example: "0,1,2,3"
    get:
      operationId: getAudioBundle
      summary: Download one or more segment WAVs as a ZIP (ZIP_STORED)
      description: |
        Returns a ZIP archive (uncompressed `ZIP_STORED` — WAV is already
        incompressible) of per-segment `.wav` files. Filename inside the ZIP is
        `{segment_index}.wav`. A `Content-Disposition: attachment` header is set.

        Requires `X-User-Id`. The orchestrator's `_assert_read_owned` helper
        rejects cross-tenant access with `404 Not found`.
      tags: [Segments/Audio]
      responses:
        "200":
          description: ZIP archive
          headers:
            Content-Disposition:
              description: "`attachment; filename=\"{read_id}-audio.zip\"`"
              schema:
                type: string
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: |
            No audio found for this read, none of the requested indices exist,
            or the read belongs to a different user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /audio/{read_id}/{segment_index}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
      - $ref: "#/components/parameters/SegmentIndexParam"
    get:
      operationId: getAudioSegment
      summary: Stream a single segment's WAV
      description: |
        Requires `X-User-Id`. The orchestrator's `_assert_read_owned` helper
        rejects cross-tenant access with `404 Not found`.
      tags: [Segments/Audio]
      responses:
        "200":
          description: WAV payload
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: |
            Audio not found, or the read belongs to a different user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Thumbnails ─────────────────────────
  /reads/{read_id}/thumbnail:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    post:
      operationId: uploadThumbnail
      summary: Upload or fetch a thumbnail for a read
      description: |
        Accepts either a multipart file (`file` field) or a JSON body with a
        `url` to fetch. The orchestrator detects which by inspecting
        `Content-Type`. Any existing thumbnail for this read is removed first.

        Requires `X-User-Id`. The orchestrator's `_assert_read_owned` helper
        rejects cross-tenant access with `404 Not found`.
      tags: [Thumbnails]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (jpeg/png/webp/gif)
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: Remote image URL to fetch and store
      responses:
        "204":
          description: Thumbnail stored
        "400":
          description: Missing file or url, or wrong content-type
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Read not found or belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to download thumbnail from the provided URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /thumbnails/{read_id}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    get:
      operationId: getThumbnail
      summary: Serve the thumbnail image for a read
      description: |
        Looks up a thumbnail under `THUMBNAILS_DIR/{read_id}.*` and streams it
        with the matching image MIME type.

        Requires `X-User-Id`. The orchestrator's `_assert_read_owned` helper
        rejects cross-tenant access with `404 Not found`.
      tags: [Thumbnails]
      responses:
        "200":
          description: Image bytes
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: |
            Thumbnail not found, or the read belongs to a different user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Images ─────────────────────────
  /reads/{read_id}/images:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    post:
      operationId: uploadReadImage
      summary: Upload or fetch an inline image for a read
      description: |
        Accepts either a multipart file (`file` + `index` fields) or a JSON body
        with `url` and `index`. The orchestrator detects which by inspecting
        `Content-Type`.

        `index` must be an integer in `[0, 9999]`. Any existing image at the
        same index is removed first. URL fetches are validated against SSRF
        (private/loopback/link-local addresses are rejected). Maximum image
        size is 10 MB.

        Requires `X-User-Id`. The orchestrator's `_assert_read_owned` helper
        rejects cross-tenant access with `404 Not found`.
      tags: [Images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                index:
                  type: integer
                  minimum: 0
                  maximum: 9999
                  default: 0
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                index:
                  type: integer
                  minimum: 0
                  maximum: 9999
                  default: 0
      responses:
        "201":
          description: Image stored
          content:
            application/json:
              schema:
                type: object
                required: [index]
                properties:
                  index:
                    type: integer
        "400":
          description: Invalid request (missing file/url, bad index, disallowed URL scheme, or private host)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Read not found or belongs to a different user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Image exceeds 10 MB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to download image from the provided URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /images/{read_id}/{index}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
      - name: index
        in: path
        required: true
        description: Image index within the read
        schema:
          type: integer
          minimum: 0
    get:
      operationId: getReadImage
      summary: Serve an inline image by index
      description: |
        Looks up `IMAGES_DIR/{read_id}/{index}.*` and streams it with the
        matching image MIME type.

        Requires `X-User-Id`. The orchestrator's `_assert_read_owned` helper
        rejects cross-tenant access with `404 Not found`.
      tags: [Images]
      responses:
        "200":
          description: Image bytes
          content:
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/svg+xml:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: |
            Image not found, or the read belongs to a different user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Voices ─────────────────────────
  /voices:
    get:
      operationId: listVoices
      summary: List built-in and user-cloned voices
      description: |
        Returns every built-in voice (`user_id IS NULL`) plus the current
        user's cloned voices.
      tags: [Voices]
      responses:
        "200":
          description: Array of voices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /voices/sync:
    post:
      operationId: syncVoices
      summary: Refresh built-in voice list from the active TTS engine
      description: |
        Calls the active engine's `/tts/voices` endpoint and reconciles the
        `voices` table (inserts new names, deletes stale built-ins). Returns
        the merged list including the current user's cloned voices.
      tags: [Voices]
      responses:
        "200":
          description: Updated voice list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: No TTS engine running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /voices/clone:
    post:
      operationId: cloneVoice
      summary: Clone a voice from an uploaded WAV reference
      description: |
        Uploads the WAV to the active TTS engine's `/tts/clone-voice`
        endpoint, stores it under `VOICES_DIR/{user_id}/{name}.wav`, and
        inserts a `cloned` row in the `voices` table.

        `name` must match `^[A-Za-z0-9 _-]{1,64}$` (letters, digits, spaces,
        hyphens, underscores; 1–64 characters). Violations return `400`.
      tags: [Voices]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, file]
              properties:
                name:
                  type: string
                  pattern: "^[A-Za-z0-9 _-]{1,64}$"
                  minLength: 1
                  maxLength: 64
                  description: |
                    Human-friendly voice name (also used as the WAV
                    filename). Letters, digits, spaces, hyphens, and
                    underscores only; 1–64 characters.
                file:
                  type: string
                  format: binary
                  description: Reference audio (WAV)
                prompt_text:
                  type: string
                  nullable: true
                  description: Optional transcript of the reference clip (required by some engines)
      responses:
        "201":
          description: Cloned voice metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceResponse"
        "400":
          description: Voice name failed the `^[A-Za-z0-9 _-]{1,64}$` check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          description: No TTS engine running or the engine rejected the clone request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /voices/{voice_id}:
    parameters:
      - name: voice_id
        in: path
        required: true
        schema:
          type: integer
    delete:
      operationId: deleteVoice
      summary: Delete a cloned voice owned by the current user
      description: |
        Only `type = 'cloned'` voices belonging to the calling user can be
        deleted. The WAV file on disk is removed too.
      tags: [Voices]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Voice not found or not deletable (built-in voices cannot be deleted)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Bookmarks ─────────────────────────
  /reads/{read_id}/bookmarks:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    get:
      operationId: listBookmarks
      summary: List bookmarks for a read
      tags: [Bookmarks]
      responses:
        "200":
          description: Array of bookmarks (ordered by segment_index, word_offset)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookmarkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: addBookmark
      summary: Create a bookmark on a read
      tags: [Bookmarks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkRequest"
      responses:
        "201":
          description: Created bookmark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /bookmarks/{bookmark_id}:
    parameters:
      - name: bookmark_id
        in: path
        required: true
        schema:
          type: integer
    patch:
      operationId: updateBookmark
      summary: Update a bookmark's note
      tags: [Bookmarks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookmarkRequest"
      responses:
        "200":
          description: Updated bookmark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      operationId: deleteBookmark
      summary: Delete a bookmark
      tags: [Bookmarks]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───────────────────────── Settings ─────────────────────────
  /settings:
    get:
      operationId: getSettings
      summary: Get the current user's settings
      tags: [Settings]
      responses:
        "200":
          description: Settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateSettings
      summary: Upsert one or more settings for the current user
      description: |
        Each key/value pair is upserted — existing keys are overwritten, new
        keys are inserted. Keys not present in the request are left alone.
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Updated settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ───────────────────────── Backends ─────────────────────────
  /backends:
    get:
      operationId: listBackends
      summary: List all known TTS engines with their current status
      description: |
        Public route — no `X-User-Id` required. The orchestrator does not
        attach an auth dependency to this handler.
      tags: [Backends]
      security: []
      responses:
        "200":
          description: Array of engines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackendResponse"

  /backends/select:
    post:
      operationId: selectBackend
      summary: Start the named engine and make it the active one
      description: |
        Stops any currently running engine, starts the requested one, and
        refreshes the built-in voices table from the new engine.
      tags: [Backends]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectBackendRequest"
      responses:
        "200":
          description: Engine now active
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown engine name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationError"
        "503":
          description: Failed to start the engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /backends/install:
    post:
      operationId: installBackend
      summary: Trigger a background install of an engine
      description: |
        Returns immediately with a message envelope while installation proceeds
        in a background task. Progress is published on `/backends/events` as
        `backend:status` events. Calling this for an engine that is already
        installed/running/stopped is a no-op and returns `200`.
      tags: [Backends]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectBackendRequest"
      responses:
        "200":
          description: Install started (or already installed/installing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown engine name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          $ref: "#/components/responses/ValidationError"

  /backends/{name}:
    parameters:
      - name: name
        in: path
        required: true
        description: Engine identifier (e.g. `pocket-tts`, `xtts`, `f5tts`)
        schema:
          type: string
    delete:
      operationId: uninstallBackend
      summary: Uninstall an engine
      tags: [Backends]
      responses:
        "200":
          description: Uninstalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown engine name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Engine is currently installing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Uninstall failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /backends/events:
    get:
      operationId: backendEvents
      summary: Subscribe to engine status events (SSE)
      description: |
        Returns a `text/event-stream` connection. Events are named
        `backend:status`.

        Example:
        ```
        event: backend:status
        data: "{\"name\":\"pocket-tts\",\"status\":\"running\"}"
        ```

        `status` is one of `available | installing | installed | running | stopped | unavailable`.

        **Wire format note:** The `data:` field is a JSON-encoded **string**
        (the orchestrator calls `json.dumps` before handing payloads to
        `sse_starlette`). Clients must `JSON.parse` the `data:` value to
        obtain the `BackendStatusEvent` object.

        Public route — no `X-User-Id` required.
      tags: [Backends]
      security: []
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/BackendStatusEvent"

  # ───────────────────────── Queue ─────────────────────────
  /queue:
    get:
      operationId: listQueue
      summary: List the current user's jobs (newest first)
      tags: [Jobs]
      responses:
        "200":
          description: Array of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /queue/{job_id}:
    parameters:
      - name: job_id
        in: path
        required: true
        schema:
          type: integer
    delete:
      operationId: cancelJob
      summary: Cancel a job
      description: |
        Jobs already in a terminal state (`done`, `failed`, `cancelled`) return
        `409`.
      tags: [Jobs]
      responses:
        "204":
          description: Cancelled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Job already in a terminal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /queue/events:
    get:
      operationId: queueEvents
      summary: Subscribe to job progress events for the current user (SSE)
      description: |
        Returns a `text/event-stream` connection. Each event is one of:
        `job:queued`, `job:started`, `job:progress`, `job:completed`,
        `job:failed`, `job:cancelled`.

        Example:
        ```
        event: job:progress
        data: "{\"jobId\":12,\"readId\":3,\"progress\":5,\"total\":20,\"segmentIndex\":4}"
        ```

        **Wire format note:** The `data:` field is a JSON-encoded **string**
        (the orchestrator calls `json.dumps` before handing payloads to
        `sse_starlette`). Clients must `JSON.parse` the `data:` value to
        obtain the `JobEvent` object.
      tags: [Jobs]
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/JobEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    userIdHeader:
      type: apiKey
      in: header
      name: X-User-Id
      description: |
        Integer user ID injected by the BFF after it validates the JWT cookie.
        The orchestrator trusts this header blindly — the BFF is responsible
        for authentication. A missing or non-integer value yields
        `401 Invalid user ID`.

  parameters:
    ReadIdParam:
      name: read_id
      in: path
      required: true
      description: Read (library item) ID
      schema:
        type: integer
        minimum: 1
    SegmentIndexParam:
      name: segment_index
      in: path
      required: true
      description: Zero-based segment index within the read
      schema:
        type: integer
        minimum: 0

  responses:
    Unauthorized:
      description: Missing or invalid `X-User-Id` header (401)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ValidationError:
      description: Request body failed Pydantic validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: |
        Too many requests — sliding-window rate limit exceeded for this client
        IP. `POST /auth/login` allows 5/min; `POST /auth/register` allows 3/min.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # ── Errors ──
    Error:
      type: object
      description: |
        FastAPI default error payload. `HTTPException` populates `detail`;
        `RequestValidationError` populates `detail` with a structured array.
      properties:
        detail:
          description: Error message (string) or structured validation detail (array).
          oneOf:
            - type: string
            - type: array
              items:
                type: object

    MessageResponse:
      type: object
      description: Generic `{message}` envelope used by backend install/uninstall.
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: |
            Must be a valid email address — validated server-side via
            Pydantic's `EmailStr` in `orchestrator/models.py`.
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: |
            Plaintext password. Validated server-side as 8–128 characters
            (see `orchestrator/models.py`). Hashed with bcrypt before
            storage; no additional complexity policy is enforced.
        display_name:
          type: string
          nullable: true
          maxLength: 100
          description: |
            Optional display name, up to 100 characters
            (`orchestrator/models.py`).

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    UserResponse:
      type: object
      required: [id, email, display_name, created_at]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
          description: |
            User's display name. **Required but nullable** — the field is
            always present in the response envelope (matches
            `orchestrator/models.py` `display_name: str | None`), but may be
            `null` if the user did not provide one at registration.
        created_at:
          type: string
          description: ISO-8601 timestamp (SQLite `datetime('now')` format)

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        token:
          type: string
          description: JWT signed with `MURMUR_JWT_SECRET` (`sub` claim is the user id, 72h expiry)

    # ── Reads ──
    CreateReadRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
          description: Plain text — the orchestrator splits this into sentence-sized segments.
        type:
          type: string
          default: text
          description: |
            Free-form tag for the read source. Frontend uses `text`, `url`,
            and `file`, but the orchestrator Pydantic model declares this as
            a plain `str` and accepts any string.
        source_url:
          type: string
          format: uri
          nullable: true
        file_name:
          type: string
          nullable: true

    UpdateReadRequest:
      type: object
      description: At least one field must be provided (empty body returns 400).
      minProperties: 1
      properties:
        title:
          type: string
          nullable: true
        progress_segment:
          type: integer
          nullable: true
          minimum: 0
        progress_word:
          type: integer
          nullable: true
          minimum: 0

    SegmentResponse:
      type: object
      required:
        - id
        - read_id
        - segment_index
        - text
        - audio_generated
        - word_timings_json
        - generated_at
      properties:
        id:
          type: integer
        read_id:
          type: integer
        segment_index:
          type: integer
          minimum: 0
        text:
          type: string
        audio_generated:
          type: boolean
        word_timings_json:
          type: string
          nullable: true
          description: JSON-encoded array of `{word, start, end}` produced by WhisperX alignment
        generated_at:
          type: string
          nullable: true

    ReadSummary:
      type: object
      required:
        - id
        - user_id
        - title
        - type
        - source_url
        - file_name
        - progress_segment
        - progress_word
        - segment_count
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        type:
          type: string
        source_url:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        progress_segment:
          type: integer
          minimum: 0
        progress_word:
          type: integer
          minimum: 0
        segment_count:
          type: integer
          minimum: 0
        created_at:
          type: string
        updated_at:
          type: string
        voice:
          type: string
          nullable: true
        engine:
          type: string
          nullable: true
        generated_at:
          type: string
          nullable: true

    ReadDetail:
      type: object
      required:
        - id
        - user_id
        - title
        - type
        - source_url
        - file_name
        - content
        - progress_segment
        - progress_word
        - created_at
        - updated_at
        - segments
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        type:
          type: string
        source_url:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        content:
          type: string
        progress_segment:
          type: integer
          minimum: 0
        progress_word:
          type: integer
          minimum: 0
        created_at:
          type: string
        updated_at:
          type: string
        voice:
          type: string
          nullable: true
        engine:
          type: string
          nullable: true
        generated_at:
          type: string
          nullable: true
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentResponse"

    # ── Bookmarks ──
    CreateBookmarkRequest:
      type: object
      required: [segment_index]
      properties:
        segment_index:
          type: integer
          minimum: 0
        word_offset:
          type: integer
          minimum: 0
          default: 0
        note:
          type: string
          nullable: true

    UpdateBookmarkRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true

    BookmarkResponse:
      type: object
      required: [id, read_id, segment_index, word_offset, note, created_at]
      properties:
        id:
          type: integer
        read_id:
          type: integer
        segment_index:
          type: integer
        word_offset:
          type: integer
        note:
          type: string
          nullable: true
        created_at:
          type: string

    # ── Voices ──
    VoiceResponse:
      type: object
      required: [id, user_id, name, type, created_at]
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
          description: Null for built-in voices
        name:
          type: string
        type:
          type: string
          description: |
            `builtin` (synced from the active engine, `user_id` is null) or
            `cloned` (created via `POST /voices/clone`, `user_id` is the
            owner). The Pydantic model declares this as a plain `str`.
        created_at:
          type: string

    # ── Settings ──
    SettingsResponse:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties:
            type: string

    UpdateSettingsRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties:
            type: string

    # ── Health ──
    HealthResponse:
      type: object
      required: [status, db, active_engine, alignment]
      properties:
        status:
          type: string
          example: ok
        db:
          type: string
          description: |
            Database status. Known values: `ok`, `unavailable`. Advisory —
            the orchestrator Pydantic model declares this as a plain `str`.
        active_engine:
          type: string
          nullable: true
          description: Name of the currently running TTS engine, or null
        alignment:
          type: string
          nullable: true
          description: |
            Reserved; always `null` in the current implementation
            (`orchestrator/routers/health.py`). Retained so a future alignment
            probe can populate it without a breaking change.

    # ── Backends ──
    BackendResponse:
      type: object
      required: [name, display_name, description, size, status, gpu, builtin_voices]
      properties:
        name:
          type: string
          description: Engine identifier (e.g. `pocket-tts`)
        display_name:
          type: string
        description:
          type: string
        size:
          type: string
          description: Human-readable disk footprint (e.g. "300 MB")
        status:
          type: string
          description: |
            Lifecycle state of the engine. Known values:
            `available`, `installing`, `installed`, `running`, `stopped`,
            `unavailable`. **Advisory — not enforced server-side.** The
            orchestrator Pydantic model declares this as a plain `str`, so new
            values may appear over time without a schema change. See the
            `EngineStatus` schema for a narrowed enum clients can opt into.
        gpu:
          type: boolean
          description: Whether the engine requires/benefits from a GPU
        builtin_voices:
          type: boolean
          description: Whether the engine ships with preset voices

    EngineStatus:
      type: string
      enum: [available, installing, installed, running, stopped, unavailable]
      description: |
        Lifecycle state of an engine:
        - `available`: not installed
        - `installing`: background install in progress
        - `installed`: installed but not running
        - `running`: process is up and serving requests
        - `stopped`: process crashed or was stopped
        - `unavailable`: install attempted but not usable (missing deps etc.)

    SelectBackendRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    # ── Jobs ──
    GenerateRequest:
      type: object
      required: [voice]
      properties:
        voice:
          type: string
          description: Voice name (must match a `VoiceResponse.name`)
        language:
          type: string
          nullable: true
          description: ISO language code, engine-specific
        regenerate:
          type: boolean
          default: false
          description: If true, clears all existing audio for the read first

    JobStatus:
      type: string
      enum: [pending, waiting_for_backend, running, done, failed, cancelled]
      description: Narrowed enum clients can opt into — not enforced server-side.

    JobResponse:
      type: object
      required:
        - id
        - user_id
        - read_id
        - voice
        - engine
        - language
        - status
        - progress
        - total
        - error
        - created_at
        - started_at
        - completed_at
      properties:
        id:
          type: integer
        user_id:
          type: integer
        read_id:
          type: integer
        voice:
          type: string
        engine:
          type: string
        language:
          type: string
          nullable: true
        status:
          type: string
          description: |
            Job lifecycle state. Known values: `pending`,
            `waiting_for_backend`, `running`, `done`, `failed`, `cancelled`.
            **Advisory — not enforced server-side.** The orchestrator Pydantic
            model declares this as a plain `str`, so new values may appear
            over time without a schema change. See the `JobStatus` schema for
            a narrowed enum clients can opt into.
        progress:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        error:
          type: string
          nullable: true
        created_at:
          type: string
        started_at:
          type: string
          nullable: true
        completed_at:
          type: string
          nullable: true

    # ── SSE event payloads ──
    JobEvent:
      type: object
      description: |
        Parsed payload of a `/queue/events` SSE event. The event name
        (`job:queued`, `job:started`, `job:progress`, `job:completed`,
        `job:failed`, `job:cancelled`) is carried in the SSE `event:` field;
        the fields below are the JSON inside the `data:` field (which is
        itself a JSON-encoded string — clients must `JSON.parse` it). Not
        all fields are present on every event — e.g.
        `progress`/`total`/`segmentIndex` appear on `job:progress`,
        `error` on `job:failed`, `position` on `job:queued`.
      required: [jobId, readId]
      properties:
        jobId:
          type: integer
        readId:
          type: integer
        position:
          type: integer
          description: Queue position (only on `job:queued`)
        progress:
          type: integer
          description: Segments completed so far
        total:
          type: integer
        segmentIndex:
          type: integer
          description: Segment that was just generated (on `job:progress`)
        error:
          type: string
          description: Failure reason (on `job:failed`)

    BackendStatusEvent:
      type: object
      description: |
        Parsed payload of a `/backends/events` SSE event (event name
        `backend:status`). The orchestrator emits `status` as a plain string;
        known values are documented in the `EngineStatus` schema. The `data:`
        field is a JSON-encoded string — clients must `JSON.parse` it.
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          description: |
            Engine lifecycle state. Known values: `available`, `installing`,
            `installed`, `running`, `stopped`, `unavailable`. Advisory — not
            enforced server-side.
