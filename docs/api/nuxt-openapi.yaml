openapi: 3.1.0
info:
  title: Murmur BFF API
  version: 1.0.0
  description: |
    HTTP API surface that the Murmur Nuxt/Nitro BFF exposes to browsers under `/api/*`.
    This is the browser-facing contract only — the orchestrator and TTS engine APIs are
    documented separately in `orchestrator-openapi.yaml` and `tts-engine-openapi.yaml`.

    The BFF validates a JWT stored in the `murmur_token` httpOnly cookie, injects an
    `X-User-Id` header, and proxies most calls to the FastAPI orchestrator. A small
    number of routes (auth + `/api/extract-url`) are implemented directly by Nitro.

    ## Authentication
    A JWT is issued on `/api/auth/login` or `/api/auth/register` and stored as an
    httpOnly cookie named `murmur_token` (72h expiry). Clients just need to include
    cookies; the BFF handles everything else. Public routes are `/api/auth/login`,
    `/api/auth/register`, `/api/auth/logout`, and `/api/health`.

    ## Server-Sent Events
    `/api/queue/events` and `/api/backends/events` return `text/event-stream`. Each
    event has a named type (`event:` field) and a JSON-encoded `data:` payload.

    ## Per-user isolation
    All resources (reads, voices, bookmarks, jobs, settings) are scoped to the
    authenticated user via the JWT.

    ## Deployment topology
    In production, Caddy terminates TLS and reverse-proxies to the Nuxt container.
    Caddy listens on two ports (both configurable via `MURMUR_HTTP_PORT` / `MURMUR_PORT`
    in `.env`):
    - **HTTP** serves a one-time setup page with the CA certificate download
      (`GET /ca.crt`) and install instructions. It does NOT serve the API.
    - **HTTPS** serves the Nuxt app and the `/api/*` routes documented here.

    `MURMUR_HOST` is the LAN IP or hostname the user points their phone at —
    e.g. `192.168.0.29`. There is no fixed hostname; each deployment chooses one.

servers:
  - url: http://localhost:4000
    description: Local Nuxt dev server (`npm run dev`, no Caddy, no HTTPS)
  - url: https://{host}:{port}
    description: |
      Production via Caddy TLS (self-signed via `tls internal`). `{host}` is the
      LAN IP configured via `MURMUR_HOST`; `{port}` defaults to 443 (override
      with `MURMUR_PORT`).
    variables:
      host:
        default: 192.168.1.100
        description: |
          LAN IP or hostname set via `MURMUR_HOST`. Example values: `192.168.0.29`,
          `10.0.0.5`. Must resolve from the client device.
      port:
        default: "443"
        description: HTTPS port; override with `MURMUR_PORT` in `.env`.
  - url: http://orchestrator:8000
    description: |
      Direct orchestrator access inside the Docker Compose network — NOT used by
      this BFF spec. Shown here only for orientation; the orchestrator's own API
      is documented in `orchestrator-openapi.yaml`.

tags:
  - name: Auth
    description: Registration, login, logout, current-user info
  - name: Health
    description: Liveness/readiness probe
  - name: Reads
    description: Library of user-created reads (text, URL, file imports)
  - name: Segments/Audio
    description: Audio segment streaming and bundle download
  - name: Voices
    description: Built-in and user-cloned voices
  - name: Bookmarks
    description: Per-read bookmarks
  - name: Jobs
    description: TTS generation job queue
  - name: Backends
    description: TTS engine lifecycle (install, select, uninstall, events)
  - name: Settings
    description: Per-user key/value settings
  - name: Images
    description: Inline images extracted from imported documents
  - name: Thumbnails
    description: Library card thumbnails
  - name: Utility
    description: BFF-only helpers (URL extraction)

security:
  - cookieAuth: []

paths:
  # ───────────────────────── Auth (Nitro-owned) ─────────────────────────
  /api/auth/register:
    post:
      operationId: register
      summary: Register a new user
      description: |
        Creates a user, issues a JWT, and sets it as the `murmur_token` httpOnly cookie.
        Returns the user object (without token — token is in the cookie).

        Proxied to the orchestrator, which rate-limits to **3 requests per
        minute per client IP** (sliding window); excess requests are forwarded
        here as `429`.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created, cookie set
          headers:
            Set-Cookie:
              description: httpOnly `murmur_token` JWT cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          description: |
            Request body failed Pydantic validation (invalid email format,
            password shorter than 8 or longer than 128 characters, or
            `display_name` longer than 100 characters). Forwarded from the
            orchestrator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/login:
    post:
      operationId: login
      summary: Log in with email and password
      description: |
        Verifies credentials, issues a JWT, and sets it as the `murmur_token` httpOnly cookie.

        Proxied to the orchestrator, which rate-limits to **5 requests per
        minute per client IP** (sliding window); excess requests are forwarded
        here as `429`.
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated; cookie set
          headers:
            Set-Cookie:
              description: httpOnly `murmur_token` JWT cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          description: Request body failed validation (e.g. malformed email). Forwarded from the orchestrator.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/ServerError"

  /api/auth/logout:
    post:
      operationId: logout
      summary: Log out the current user
      description: Clears the `murmur_token` cookie. Safe to call while unauthenticated.
      tags: [Auth]
      security: []
      responses:
        "204":
          description: Cookie cleared

  /api/auth/me:
    get:
      operationId: getCurrentUser
      summary: Get the authenticated user
      tags: [Auth]
      responses:
        "200":
          description: The current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───────────────────────── Utility (Nitro-owned) ─────────────────────────
  /api/extract-url:
    post:
      operationId: extractUrl
      summary: Server-side fetch of a web page
      description: |
        Fetches the target URL server-side to avoid CORS issues when importing web
        articles. Returns the raw HTML and an optional `og:image` URL for use as a
        thumbnail. The client then runs Readability locally on the returned HTML.

        **SSRF guard.** The Nitro handler
        (`frontend/server/api/extract-url.post.ts`) enforces the following:

        - Scheme must be `http:` or `https:` (other schemes → `400`).
        - Literal IP hosts and hostnames that DNS-resolve to loopback, RFC1918
          private space, link-local, carrier-grade NAT, IPv6 unique-local, or
          the AWS IMDS range are rejected with `400`.
        - Redirect chains longer than 5 hops return `502`.
        - Response bodies larger than 5 MB return `413`.
        - `Content-Type` must start with `text/html` (`415` otherwise).
        - Non-2xx upstream responses pass through as the same status code
          (e.g. `404`, `500`, `502`).
      tags: [Utility]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtractUrlRequest"
      responses:
        "200":
          description: Page fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractUrlResponse"
        "400":
          description: Missing/invalid URL, disallowed scheme, or target resolves to a private/loopback/link-local address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Upstream response exceeds the 5 MB body cap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "415":
          description: Upstream responded with a non-`text/html` `Content-Type`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Too many redirects (>5), or the upstream fetch failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Health ─────────────────────────
  /api/health:
    get:
      operationId: getHealth
      summary: Liveness and readiness status
      description: Reports database status, the active TTS engine, and alignment status.
      tags: [Health]
      security: []
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ───────────────────────── Reads ─────────────────────────
  /api/reads:
    get:
      operationId: listReads
      summary: List the current user's reads
      tags: [Reads]
      responses:
        "200":
          description: Array of read summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRead
      summary: Create a new read
      description: |
        Creates a read; the orchestrator splits `content` into sentences server-side
        and creates one `AudioSegment` row per sentence.
      tags: [Reads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReadRequest"
      responses:
        "201":
          description: Read created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/reads/{read_id}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    get:
      operationId: getRead
      summary: Get a read with its segments
      tags: [Reads]
      responses:
        "200":
          description: Read detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRead
      summary: Update title or playback progress
      tags: [Reads]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateReadRequest"
      responses:
        "200":
          description: Updated read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRead
      summary: Delete a read and all its audio/thumbnails/images
      tags: [Reads]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reads/{read_id}/generate:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    post:
      operationId: generateAudio
      summary: Start a TTS generation job
      description: |
        Enqueues a job to generate audio for all ungenerated segments. If
        `regenerate=true`, all segment audio/word-timings are cleared first.
        Rejects if another job is already active for this read.
      tags: [Jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateRequest"
      responses:
        "201":
          description: Job created and queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobResponse"
        "400":
          description: All segments already generated or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A job is already active for this read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: No TTS engine is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Segments / Audio ─────────────────────────
  /api/audio/{read_id}/{segment_index}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
      - $ref: "#/components/parameters/SegmentIndexParam"
    get:
      operationId: getSegmentAudio
      summary: Stream a single segment's WAV
      tags: [Segments/Audio]
      responses:
        "200":
          description: WAV audio
          content:
            audio/wav:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/audio/{read_id}/bundle:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
      - name: segments
        in: query
        required: false
        description: |
          Comma-separated list of segment indices to bundle (e.g. `0,1,2`). If
          omitted, all generated segments are included.
        schema:
          type: string
          example: "0,1,2"
    get:
      operationId: getAudioBundle
      summary: Download segments as a single ZIP
      description: |
        Returns a ZIP (stored, not deflated) containing one WAV per requested segment,
        named `{segment_index}.wav`. Used by clients to bundle downloads (up to 30
        segments at a time per the offline sync client).
      tags: [Segments/Audio]
      responses:
        "200":
          description: ZIP of WAVs
          content:
            application/zip:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              description: Attachment with filename `{readId}-audio.zip`
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───────────────────────── Thumbnails ─────────────────────────
  /api/thumbnails/{read_id}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    get:
      operationId: getThumbnail
      summary: Get the thumbnail image for a read
      tags: [Thumbnails]
      responses:
        "200":
          description: Thumbnail image (jpeg/png/webp/gif)
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
            image/gif: { schema: { type: string, format: binary } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reads/{read_id}/thumbnail:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    post:
      operationId: uploadThumbnail
      summary: Upload (or download-by-URL) a thumbnail for a read
      description: |
        Accepts either a multipart file upload (`file`) or a JSON body with a `url`.
        When a URL is supplied, the orchestrator fetches it server-side.
      tags: [Thumbnails]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file (jpeg, png, webp, gif)
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                  description: Remote URL to download the thumbnail from
      responses:
        "204":
          description: Thumbnail saved
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: Failed to download from URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Images ─────────────────────────
  /api/images/{read_id}/{index}:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
      - $ref: "#/components/parameters/ImageIndexParam"
    get:
      operationId: getReadImage
      summary: Get an inline image extracted from a read
      tags: [Images]
      responses:
        "200":
          description: Image bytes
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
            image/webp: { schema: { type: string, format: binary } }
            image/gif: { schema: { type: string, format: binary } }
            image/svg+xml: { schema: { type: string, format: binary } }
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/reads/{read_id}/images:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    post:
      operationId: uploadReadImage
      summary: Upload (or download-by-URL) an inline image for a read
      description: |
        Accepts either a multipart file upload (`file` + `index`) or a JSON body
        with `url` + `index`. When a URL is supplied, the orchestrator validates
        the URL against SSRF rules and fetches it. Max image size 10 MB.
      tags: [Images]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                index:
                  type: integer
                  minimum: 0
                  maximum: 9999
                  default: 0
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
                index:
                  type: integer
                  minimum: 0
                  maximum: 9999
                  default: 0
      responses:
        "201":
          description: Image saved
          content:
            application/json:
              schema:
                type: object
                required: [index]
                properties:
                  index:
                    type: integer
                    minimum: 0
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Image exceeds 10 MB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Failed to download from URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ───────────────────────── Voices ─────────────────────────
  /api/voices:
    get:
      operationId: listVoices
      summary: List available voices (builtin + user-cloned)
      tags: [Voices]
      responses:
        "200":
          description: Array of voices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/voices/sync:
    post:
      operationId: syncVoices
      summary: Re-sync builtin voices from the active engine
      description: |
        Queries the active TTS engine for its builtin voices and upserts them.
        Returns the combined list (builtin + user-cloned).
      tags: [Voices]
      responses:
        "200":
          description: Combined voice list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VoiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: No TTS engine is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/voices/clone:
    post:
      operationId: cloneVoice
      summary: Clone a voice from a WAV upload
      description: |
        Uploads a reference WAV and registers a cloned voice with the active TTS engine.
        For F5/GPT-SoVITS/CosyVoice, `prompt_text` is optional (engines auto-transcribe).
      tags: [Voices]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, file]
              properties:
                name:
                  type: string
                  description: Unique voice name (used as WAV filename too)
                file:
                  type: string
                  format: binary
                  description: Reference WAV (ideally 3-30s of clean speech)
                prompt_text:
                  type: string
                  description: Optional transcript of the reference WAV
      responses:
        "201":
          description: Cloned voice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VoiceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "503":
          description: No TTS engine is running or engine rejected the clone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/voices/{voice_id}:
    parameters:
      - $ref: "#/components/parameters/VoiceIdParam"
    delete:
      operationId: deleteVoice
      summary: Delete a user-cloned voice
      description: Only `cloned` voices owned by the current user can be deleted.
      tags: [Voices]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───────────────────────── Bookmarks ─────────────────────────
  /api/reads/{read_id}/bookmarks:
    parameters:
      - $ref: "#/components/parameters/ReadIdParam"
    get:
      operationId: listBookmarks
      summary: List bookmarks for a read
      tags: [Bookmarks]
      responses:
        "200":
          description: Array of bookmarks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BookmarkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: addBookmark
      summary: Add a bookmark at a specific segment/word
      tags: [Bookmarks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookmarkRequest"
      responses:
        "201":
          description: Bookmark created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/bookmarks/{bookmark_id}:
    parameters:
      - $ref: "#/components/parameters/BookmarkIdParam"
    patch:
      operationId: updateBookmark
      summary: Update a bookmark's note
      tags: [Bookmarks]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBookmarkRequest"
      responses:
        "200":
          description: Updated bookmark
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BookmarkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteBookmark
      summary: Delete a bookmark
      tags: [Bookmarks]
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ───────────────────────── Settings ─────────────────────────
  /api/settings:
    get:
      operationId: getSettings
      summary: Get the current user's settings (key/value map)
      tags: [Settings]
      responses:
        "200":
          description: Settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: updateSettings
      summary: Upsert settings keys
      description: Each key/value in the request body is upserted (existing keys are updated).
      tags: [Settings]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsRequest"
      responses:
        "200":
          description: Updated settings map
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───────────────────────── Backends ─────────────────────────
  /api/backends:
    get:
      operationId: listBackends
      summary: List all TTS engines with their current status
      tags: [Backends]
      responses:
        "200":
          description: Array of backend descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BackendResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/backends/select:
    post:
      operationId: selectBackend
      summary: Start + activate an engine (stops any other running engine)
      tags: [Backends]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectBackendRequest"
      responses:
        "200":
          description: Selected backend descriptor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Engine failed to start
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/backends/install:
    post:
      operationId: installBackend
      summary: Install a TTS engine (runs in background)
      description: |
        Returns immediately; installation progress is reported via `/api/backends/events`
        (`backend:status` events with status `installing` → `installed` or `available`).
      tags: [Backends]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SelectBackendRequest"
      responses:
        "200":
          description: Install queued or already installed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/backends/{name}:
    parameters:
      - $ref: "#/components/parameters/BackendNameParam"
    delete:
      operationId: uninstallBackend
      summary: Uninstall a TTS engine
      tags: [Backends]
      responses:
        "200":
          description: Engine uninstalled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Unknown engine
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Engine is currently installing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Uninstall failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/backends/events:
    get:
      operationId: backendEvents
      summary: Subscribe to backend status changes (SSE)
      description: |
        Returns a `text/event-stream` connection. The server emits events named
        `backend:status`:

        ```
        event: backend:status
        data: "{\"name\":\"pocket-tts\",\"status\":\"running\"}"
        ```

        `status` is one of `available | installing | installed | running | stopped | unavailable`.

        **Wire format note:** Each event's `data:` line contains a JSON-encoded
        **string** of the schema shown below (not an inline object). The
        orchestrator serializes the payload via `json.dumps` before handing it to
        `sse_starlette`, so clients must `JSON.parse` the `data:` value to obtain
        the `BackendStatusEvent` object. The schema below documents the parsed
        (deserialized) shape.
      tags: [Backends]
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/BackendStatusEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ───────────────────────── Queue ─────────────────────────
  /api/queue:
    get:
      operationId: listQueue
      summary: List the current user's jobs (newest first)
      tags: [Jobs]
      responses:
        "200":
          description: Array of jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/queue/{job_id}:
    parameters:
      - $ref: "#/components/parameters/JobIdParam"
    delete:
      operationId: cancelJob
      summary: Cancel a job
      description: Only jobs in `pending`, `running`, or `waiting_for_backend` can be cancelled.
      tags: [Jobs]
      responses:
        "204":
          description: Cancelled
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Job is already in a terminal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/queue/events:
    get:
      operationId: queueEvents
      summary: Subscribe to job progress events for the current user (SSE)
      description: |
        Returns a `text/event-stream` connection. Each event is one of:
        `job:queued`, `job:started`, `job:progress`, `job:completed`, `job:failed`, `job:cancelled`.

        Example:
        ```
        event: job:progress
        data: "{\"jobId\":12,\"readId\":3,\"progress\":5,\"total\":20,\"segmentIndex\":4}"
        ```

        **Wire format note:** Each event's `data:` line contains a JSON-encoded
        **string** of the schema shown below (not an inline object). The
        orchestrator serializes the payload via `json.dumps` before handing it to
        `sse_starlette`, so clients must `JSON.parse` the `data:` value to obtain
        the `JobEvent` object. The schema below documents the parsed
        (deserialized) shape.
      tags: [Jobs]
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/JobEvent"
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  parameters:
    ReadIdParam:
      name: read_id
      in: path
      required: true
      description: Read primary key
      schema:
        type: integer
        minimum: 1
    SegmentIndexParam:
      name: segment_index
      in: path
      required: true
      description: Zero-based segment index within a read
      schema:
        type: integer
        minimum: 0
    ImageIndexParam:
      name: index
      in: path
      required: true
      description: Zero-based image index within a read
      schema:
        type: integer
        minimum: 0
    BookmarkIdParam:
      name: bookmark_id
      in: path
      required: true
      description: Bookmark primary key
      schema:
        type: integer
        minimum: 1
    VoiceIdParam:
      name: voice_id
      in: path
      required: true
      description: Voice primary key (only user-cloned voices are deletable)
      schema:
        type: integer
        minimum: 1
    JobIdParam:
      name: job_id
      in: path
      required: true
      description: Job primary key
      schema:
        type: integer
        minimum: 1
    BackendNameParam:
      name: name
      in: path
      required: true
      description: Engine name (e.g. `pocket-tts`, `xtts`, `f5tts`, `gptsovits`, `cosyvoice`)
      schema:
        type: string

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: murmur_token
      description: |
        JWT issued by `/api/auth/login` or `/api/auth/register`, stored as an
        httpOnly cookie. The Nitro BFF verifies it and injects `X-User-Id` into
        orchestrator requests.

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid auth cookie
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Resource conflict (e.g. email already registered)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: |
        Too many requests. Emitted by the orchestrator's in-memory sliding-
        window limiter for `/api/auth/login` (5/min/IP) and
        `/api/auth/register` (3/min/IP) and forwarded through the BFF.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    # ── Errors ──
    Error:
      type: object
      description: Standard error payload. FastAPI surfaces messages in `detail`.
      properties:
        detail:
          description: Error message (string) or structured validation detail (array).
          oneOf:
            - type: string
            - type: array
              items:
                type: object
        statusCode:
          type: integer
        statusMessage:
          type: string

    MessageResponse:
      type: object
      description: Generic `{message}` envelope used by backend install/uninstall.
      required: [message]
      properties:
        message:
          type: string

    # ── Auth ──
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
          description: |
            Password string. Enforced by the orchestrator's Pydantic
            `RegisterRequest` (`min_length=8, max_length=128`). Requests
            that violate this are forwarded here as `422`.
        display_name:
          type: string
          nullable: true
          maxLength: 100

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    UserResponse:
      type: object
      required: [id, email, display_name, created_at]
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        display_name:
          type: [string, "null"]
          description: |
            User's display name. **Required but nullable** — the field is
            always present in the response envelope (matches
            `orchestrator/models.py` `display_name: str | None`), but may be
            `null` if the user did not provide one at registration. Clients
            should handle both the string and null cases.
        created_at:
          type: string
          description: ISO-8601 timestamp (SQLite `datetime('now')` format)

    AuthResponse:
      type: object
      description: |
        Orchestrator-level auth payload. The Nitro BFF strips `token` (stores it in
        the httpOnly cookie) and only returns `user` to the browser, but this schema
        documents the raw shape for completeness.
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/UserResponse"
        token:
          type: string
          description: JWT signed by `MURMUR_JWT_SECRET`

    # ── Reads ──
    CreateReadRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string
          description: Plain text (the orchestrator splits into sentences)
        type:
          type: string
          enum: [text, url, file]
          default: text
        source_url:
          type: string
          format: uri
          nullable: true
        file_name:
          type: string
          nullable: true

    UpdateReadRequest:
      type: object
      description: At least one field must be provided.
      minProperties: 1
      properties:
        title:
          type: string
        progress_segment:
          type: integer
          minimum: 0
        progress_word:
          type: integer
          minimum: 0

    ReadSummary:
      type: object
      required:
        - id
        - user_id
        - title
        - type
        - source_url
        - file_name
        - progress_segment
        - progress_word
        - segment_count
        - created_at
        - updated_at
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [text, url, file]
        source_url:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        progress_segment:
          type: integer
          minimum: 0
        progress_word:
          type: integer
          minimum: 0
        segment_count:
          type: integer
          minimum: 0
        created_at:
          type: string
        updated_at:
          type: string
        voice:
          type: string
          nullable: true
        engine:
          type: string
          nullable: true
        generated_at:
          type: string
          nullable: true

    SegmentResponse:
      type: object
      required:
        - id
        - read_id
        - segment_index
        - text
        - audio_generated
        - word_timings_json
        - generated_at
      properties:
        id:
          type: integer
        read_id:
          type: integer
        segment_index:
          type: integer
          minimum: 0
        text:
          type: string
        audio_generated:
          type: boolean
        word_timings_json:
          type: string
          nullable: true
          description: JSON-encoded array of `{word, start, end}` produced by WhisperX alignment
        generated_at:
          type: string
          nullable: true

    ReadDetail:
      type: object
      required:
        - id
        - user_id
        - title
        - type
        - source_url
        - file_name
        - content
        - progress_segment
        - progress_word
        - created_at
        - updated_at
        - segments
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        type:
          type: string
          enum: [text, url, file]
        source_url:
          type: string
          nullable: true
        file_name:
          type: string
          nullable: true
        content:
          type: string
        progress_segment:
          type: integer
          minimum: 0
        progress_word:
          type: integer
          minimum: 0
        created_at:
          type: string
        updated_at:
          type: string
        voice:
          type: string
          nullable: true
        engine:
          type: string
          nullable: true
        generated_at:
          type: string
          nullable: true
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SegmentResponse"

    # ── Bookmarks ──
    CreateBookmarkRequest:
      type: object
      required: [segment_index]
      properties:
        segment_index:
          type: integer
          minimum: 0
        word_offset:
          type: integer
          minimum: 0
          default: 0
        note:
          type: string
          nullable: true

    UpdateBookmarkRequest:
      type: object
      properties:
        note:
          type: string
          nullable: true

    BookmarkResponse:
      type: object
      required: [id, read_id, segment_index, word_offset, note, created_at]
      properties:
        id:
          type: integer
        read_id:
          type: integer
        segment_index:
          type: integer
        word_offset:
          type: integer
        note:
          type: string
          nullable: true
        created_at:
          type: string

    # ── Voices ──
    VoiceResponse:
      type: object
      required: [id, user_id, name, type, created_at]
      properties:
        id:
          type: integer
        user_id:
          type: integer
          nullable: true
          description: Null for built-in voices
        name:
          type: string
        type:
          type: string
          enum: [builtin, cloned]
        created_at:
          type: string

    # ── Settings ──
    SettingsResponse:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties:
            type: string

    UpdateSettingsRequest:
      type: object
      required: [settings]
      properties:
        settings:
          type: object
          additionalProperties:
            type: string

    # ── Health ──
    HealthResponse:
      type: object
      required: [status, db, active_engine, alignment]
      properties:
        status:
          type: string
          example: ok
        db:
          type: string
          enum: [ok, unavailable]
        active_engine:
          type: string
          nullable: true
          description: Name of the currently running TTS engine, or null
        alignment:
          type: string
          nullable: true
          description: |
            Reserved; always null in current implementation. The health handler
            (`orchestrator/routers/health.py`) hard-codes this to `None`. The
            field is kept in the response envelope so future alignment-server
            probes can be added without a breaking change.

    # ── Backends ──
    BackendResponse:
      type: object
      required: [name, display_name, description, size, status, gpu, builtin_voices]
      properties:
        name:
          type: string
          description: Engine identifier (e.g. `pocket-tts`)
        display_name:
          type: string
        description:
          type: string
        size:
          type: string
          description: Human-readable disk footprint (e.g. "300 MB")
        status:
          type: string
          description: |
            Lifecycle state of the engine. Known values:
            `available`, `installing`, `installed`, `running`, `stopped`,
            `unavailable`. **Advisory — not enforced server-side.** The
            orchestrator Pydantic model declares this as a plain `str`, so new
            values may appear over time without a schema change. See the
            `EngineStatus` schema for a narrowed enum clients can opt into.
        gpu:
          type: boolean
          description: Whether the engine requires/benefits from a GPU
        builtin_voices:
          type: boolean
          description: Whether the engine ships with preset voices

    EngineStatus:
      type: string
      enum: [available, installing, installed, running, stopped, unavailable]
      description: |
        Lifecycle state of an engine:
        - `available`: not installed
        - `installing`: background install in progress
        - `installed`: installed but not running
        - `running`: process is up and serving requests
        - `stopped`: process crashed or was stopped
        - `unavailable`: install attempted but not usable (missing deps etc.)

    SelectBackendRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    # ── Jobs ──
    GenerateRequest:
      type: object
      required: [voice]
      properties:
        voice:
          type: string
          description: Voice name (must match a `VoiceResponse.name`)
        language:
          type: string
          nullable: true
          description: ISO language code, engine-specific
        regenerate:
          type: boolean
          default: false
          description: If true, clears all existing audio first

    JobStatus:
      type: string
      enum: [pending, waiting_for_backend, running, done, failed, cancelled]

    JobResponse:
      type: object
      required:
        - id
        - user_id
        - read_id
        - voice
        - engine
        - language
        - status
        - progress
        - total
        - error
        - created_at
        - started_at
        - completed_at
      properties:
        id:
          type: integer
        user_id:
          type: integer
        read_id:
          type: integer
        voice:
          type: string
        engine:
          type: string
        language:
          type: string
          nullable: true
        status:
          type: string
          description: |
            Job lifecycle state. Known values: `pending`,
            `waiting_for_backend`, `running`, `done`, `failed`, `cancelled`.
            **Advisory — not enforced server-side.** The orchestrator Pydantic
            model declares this as a plain `str`, so new values may appear
            over time without a schema change. See the `JobStatus` schema for
            a narrowed enum clients can opt into.
        progress:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0
        error:
          type: string
          nullable: true
        created_at:
          type: string
        started_at:
          type: string
          nullable: true
        completed_at:
          type: string
          nullable: true

    # ── SSE event payloads ──
    JobEvent:
      type: object
      description: |
        Payload of a `/api/queue/events` SSE event. The event name (`job:queued`,
        `job:started`, `job:progress`, `job:completed`, `job:failed`,
        `job:cancelled`) is carried in the SSE `event:` field; the fields below
        are the JSON in the `data:` field. Not all fields are present on every
        event — e.g. `progress`/`total`/`segmentIndex` appear on `job:progress`,
        `error` on `job:failed`, `position` on `job:queued`.
      required: [jobId, readId]
      properties:
        jobId:
          type: integer
        readId:
          type: integer
        position:
          type: integer
          description: Queue position (only on `job:queued`)
        progress:
          type: integer
          description: Segments completed so far
        total:
          type: integer
        segmentIndex:
          type: integer
          description: Segment that was just generated (on `job:progress`)
        error:
          type: string
          description: Failure reason (on `job:failed`)

    BackendStatusEvent:
      type: object
      description: |
        Parsed payload of a `/api/backends/events` SSE event (event name
        `backend:status`). The orchestrator emits `status` as a plain string;
        known values are documented in the `EngineStatus` schema.
      required: [name, status]
      properties:
        name:
          type: string
        status:
          type: string
          description: |
            Engine lifecycle state. Known values: `available`, `installing`,
            `installed`, `running`, `stopped`, `unavailable`. Advisory — not
            enforced server-side.

    # ── Utility ──
    ExtractUrlRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri

    ExtractUrlResponse:
      type: object
      required: [html, thumbnailUrl]
      properties:
        html:
          type: string
          description: Raw HTML of the fetched page
        thumbnailUrl:
          type: [string, "null"]
          format: uri
          description: |
            `og:image` URL if present, resolved against the page URL.
            **Required but nullable** — the field is always present on the
            response envelope (`frontend/server/api/extract-url.post.ts`
            always returns the key), but will be `null` when the page has no
            `og:image` meta tag. Clients should handle both cases.
